<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - ProfitPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900">
  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-8 w-full max-w-md">
      <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-100 mb-6 text-center">Login</h1>
      <div class="space-y-4">
        <input id="email" type="email" placeholder="Email" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-300 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" />
        <input id="password" type="password" placeholder="Password" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-300 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" />
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md">Login</button>
        <a href="#" class="block text-center text-blue-600 hover:underline dark:text-blue-400">Create account</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from './lib/firebase.js';
    import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert('Logged in successfully!');
      } catch (err) {
        alert('Login failed: ' + err.message);
      }
    });
  </script>
</body>
</html>
