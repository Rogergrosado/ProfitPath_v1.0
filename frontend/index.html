<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ProfitPath Firebase Auth Test</title>
</head>
<body>
  <h1>ProfitPath Firebase Auth Test</h1>

  <input type="email" id="email" placeholder="your-test-user@example.com" />
  <input type="password" id="password" placeholder="password" />
  <button id="login">Login</button>
  <button id="get-token">Get Token</button>

  <script type="module">
    import { auth } from './lib/firebase.js';
    import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js';

    document.getElementById('login').onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const token = await userCredential.user.getIdToken();
        console.log("✅ Logged in. Firebase ID Token:", token);
        alert("Logged in! Check the browser console for the token.");
      } catch (error) {
        console.error("❌ Login failed:", error);
        alert("Login failed. Check console.");
      }
    };

    document.getElementById('get-token').onclick = async () => {
      const user = auth.currentUser;
      if (!user) {
        alert("You must log in first.");
        return;
      }

      const token = await user.getIdToken();
      console.log("🔑 Current Token:", token);
      alert("Token printed to console.");
    };
  </script>
</body>
</html>
